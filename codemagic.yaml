workflows:
  unity-ios:
    name: Unity iOS AdHoc Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      vars:
        UNITY_VERSION: 6000.0.39f1
        UNITY_CHANGESET: 1234567890abcdef   # ←後で説明

      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.namuna.raspberrygarden

    cache:
      cache_paths:
        - /Users/builder/Library/Unity

    scripts:
      # Unity Hub CLI
      - name: Install Unity Hub
        script: |
          brew install --cask unity-hub || true

      # Unityインストール
      - name: Install Unity Editor
        script: |
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub \
          -- --headless install \
          --version $UNITY_VERSION \
          --changeset $UNITY_CHANGESET \
          -m ios

      # Unityビルド
      - name: Build iOS
        script: |
          /Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity \
          -batchmode -nographics -quit \
          -projectPath . \
          -buildTarget iOS \
          -executeMethod BuildScript.BuildiOS

      # IPA作成
      - name: Build IPA
        script: |
          cd build/iOS

          xcodebuild -scheme Unity-iPhone \
          -configuration Release \
          -archivePath build.xcarchive archive

          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
          -archivePath build.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath build

    artifacts:
      - build/iOS/build/*.ipa
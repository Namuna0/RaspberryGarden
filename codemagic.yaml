workflows:
  unity-ios:
    name: Unity iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      vars:
        UNITY_VERSION: 6000.3.11f1   # ←自分のUnityに合わせる

      ios_signing:
        distribution_type: development
        bundle_identifier: com.namuna.raspberrygarden

    scripts:
      # Unityインストール
      - name: Install Unity
        script: |
          brew install --cask unity-hub || true

      # UnityでiOSビルド
      - name: Build iOS
        script: |
          /Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity \
          -batchmode -nographics -quit \
          -projectPath . \
          -buildTarget iOS \
          -executeMethod BuildScript.BuildiOS

      # XcodeでIPA化
      - name: Build IPA
        script: |
          cd build/iOS
          xcodebuild -scheme Unity-iPhone \
          -configuration Release \
          -archivePath build.xcarchive archive

          xcodebuild -exportArchive \
          -archivePath build.xcarchive \
          -exportOptionsPlist /Users/builder/export_options.plist \
          -exportPath build

    artifacts:
      - build/iOS/build/*.ipa
workflows:
  unity-ios:
    name: Unity iOS AdHoc Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      vars:
        UNITY_VERSION: 6000.0.39f1

      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.namuna.raspberrygarden

    scripts:
      # Unityインストール（公式推奨）
      - name: Install Unity
        script: |
          brew install unity-editor@${UNITY_VERSION} || true

      # UnityでiOSプロジェクト生成
      - name: Build iOS (Unity)
        script: |
          /Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity \
          -batchmode -nographics -quit \
          -projectPath . \
          -buildTarget iOS \
          -executeMethod BuildScript.BuildiOS

      # IPA作成（Ad Hoc）
      - name: Build IPA
        script: |
          cd build/iOS

          xcodebuild -scheme Unity-iPhone \
          -configuration Release \
          -archivePath build.xcarchive archive

          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
          -archivePath build.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath build

    artifacts:
      - build/iOS/build/*.ipa